<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva reserva</title>
</head>
<body>
    <h1>Realizar reserva</h1>

    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <h2 th:text="${propiedad.titulo}">Título propiedad</h2>

    <p>
        <strong>Ciudad:</strong>
        <span th:text="${propiedad.ciudad}">Ciudad</span>
    </p>

    <p>
        <strong>Precio por noche:</strong>
        <span th:text="${propiedad.precioPorNoche} + ' €'">Precio</span>
    </p>

    <p>
        <strong>Tipo de reserva:</strong>
        <span th:text="${propiedad.reservaInmediata ? 'Reserva inmediata' : 'Solicitud pendiente de confirmación'}">
            Tipo reserva
        </span>
    </p>

    <form action="/reservas" method="post">
        <input type="hidden" name="propiedadId" th:value="${propiedad.id}">

        <p>
            <label for="nombreInquilino">Nombre del inquilino:</label><br>
            <input type="text" id="nombreInquilino" name="nombreInquilino" required>
        </p>

        <p>
            <label for="emailInquilino">Email:</label><br>
            <input type="email" id="emailInquilino" name="emailInquilino" required>
        </p>

        <p>
            <label for="fechaEntrada">Fecha de entrada:</label><br>
            <input type="date" id="fechaEntrada" name="fechaEntrada" required>
        </p>

        <p>
            <label for="fechaSalida">Fecha de salida:</label><br>
            <input type="date" id="fechaSalida" name="fechaSalida" required>
        </p>

        <p>
            <label for="metodoPago">Método de pago:</label><br>
            <select id="metodoPago" name="metodoPago">
                <option value="Tarjeta de crédito">Tarjeta de crédito</option>
                <option value="Tarjeta de débito">Tarjeta de débito</option>
                <option value="PayPal">PayPal</option>
            </select>
        </p>

        <button type="submit">Confirmar reserva</button>
    </form>

    <p>
        <a href="/propiedades">Volver a propiedades</a>
    </p>
</body>
</html>
