<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar propiedad</title>
</head>
<body>
    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{/propiedades}" th:object="${propiedad}" method="post">

        <p>
            <label for="titulo">Título:</label><br>
            <input type="text" id="titulo" th:field="*{titulo}" required>
        </p>

        <p>
            <label for="ciudad">Ciudad:</label><br>
            <input type="text" id="ciudad" th:field="*{ciudad}" required>
        </p>

        <p>
            <label for="direccion">Dirección:</label><br>
            <input type="text" id="direccion" th:field="*{direccion}" required>
        </p>

        <p>
            <label for="tipo">Tipo:</label><br>
            <select id="tipo" th:field="*{tipo}">
                <option value="Vivienda completa">Vivienda completa</option>
                <option value="Habitación individual">Habitación individual</option>
            </select>
        </p>

        <p>
            <label for="precioPorNoche">Precio por noche:</label><br>
            <input type="number" step="0.01" id="precioPorNoche" th:field="*{precioPorNoche}" required>
        </p>

        <p>
            <label for="reservaInmediata">Reserva inmediata:</label>
            <input type="checkbox" id="reservaInmediata" th:field="*{reservaInmediata}">
        </p>

        <p>
            <label for="descripcion">Descripción:</label><br>
            <textarea id="descripcion" th:field="*{descripcion}" rows="4" cols="50"></textarea>
        </p>

        <button type="submit">Guardar propiedad</button>
    </form>

    <p>
        <a href="/propiedades">Volver al listado</a>
    </p>
</body>
</html>
